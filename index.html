<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bagira Assistant</title>
  <style>
    /* General body style for context */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      margin: 0;
      padding: 20px;
      background-color: #f4f7f6; /* Light background for the page */
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #2c3e50;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    /* --- Modal Styles --- */
    /* Modal overlay */
    #bagiraFormModal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6); /* Slightly darker overlay */
      z-index: 10000;
      backdrop-filter: blur(3px); /* Optional: frosted glass effect */
    }

    /* Modal box */
    #bagiraFormModal .modal-content {
      position: relative;
      background: #fff;
      padding: 25px 30px; /* Increased padding */
      border-radius: 8px; /* Softer rounded corners */
      width: 350px; /* Slightly wider */
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 5px 10px rgba(0, 0, 0, 0.05);
      text-align: left; /* Ensure text alignment is standard */
    }

    /* Close button */
    #closeModal {
      position: absolute;
      top: 12px;
      right: 12px;
      background: transparent;
      border: none;
      font-size: 1.5rem; /* Larger for easier click */
      line-height: 1;
      cursor: pointer;
      color: #888;
      transition: color 0.2s ease-in-out;
    }
    #closeModal:hover {
      color: #555;
    }

    /* Header */
    #bagiraFormModal .modal-header {
      margin-bottom: 20px; /* More space below header */
      font-size: 1.1rem; /* Slightly larger header text */
      font-weight: 600; /* Semi-bold */
      color: #333;
    }

    /* Labels */
    #bagiraFormModal label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        font-size: 0.9rem;
        color: #454545;
    }

    /* Inputs */
    #bagiraFormModal input {
      width: 100%;
      margin-bottom: 15px; /* More space between inputs */
      padding: 12px 15px; /* More padding inside inputs */
      box-sizing: border-box;
      border: 1px solid #dcdcdc; /* Lighter border */
      border-radius: 6px; /* Rounded corners for inputs */
      font-size: 0.95rem;
      transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }

    #bagiraFormModal input:focus {
      outline: none;
      border-color: #7A3FFD; /* Bagira's purple accent on focus */
      box-shadow: 0 0 0 2px rgba(122, 63, 253, 0.2); /* Subtle glow */
    }

    #bagiraFormModal input::placeholder {
        color: #aaa;
        opacity: 1; /* Firefox */
    }

    /* Submit button */
    #bagiraFormModal button[type="submit"] {
      width: 100%; /* Full width button */
      padding: 12px 20px;
      background-color: #7A3FFD; /* Bagira's purple accent */
      color: white;
      border: none;
      border-radius: 6px; /* Rounded corners */
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out, transform 0.1s ease;
      margin-top: 10px; /* Space above button */
    }

    #bagiraFormModal button[type="submit"]:hover {
      background-color: #6028d1; /* Darker shade on hover */
    }
    #bagiraFormModal button[type="submit"]:active {
      transform: scale(0.98); /* Click effect */
    }
  </style>
</head>
<body>
  <h1>Talk to Bagira 🐾</h1>
  <p>Click the mic to ask legal questions or book a consultation.</p>

  <!-- Popup form -->
  <div id="bagiraFormModal">
    <div class="modal-content">
      <button id="closeModal" aria-label="Close">×</button>
      <div class="modal-header">
        Please provide your details below to confirm your booking.
      </div>
      <form id="bagiraForm">
        <label for="phoneInput">
          Phone Number:
        </label>
        <input type="tel" id="phoneInput" required placeholder="+1234567890">

        <label for="emailInput">
          Email:
        </label>
        <input type="email" id="emailInput" required placeholder="you@example.com">

        <button type="submit">Submit Details</button>
      </form>
    </div>
  </div>

  <script>
    var vapiInstance = null;

    const apiKey = "58f89212-0e94-4123-8f9e-3bc0dde56fe0"; // Replace with your real key

    const squad = {
      name: "Call Centre v1.3 EN",
      members: [
        {
          assistantId: "f60d3d06-8dd2-4e0e-b0e5-ed28384203a2",
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Сompany expert (EN)",
              message: "One second",
              description: "If client has questions regarding company registration"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - TRP expert (EN)",
              message: "One second",
              description: "If client has questions regarding residence permit"
            }
          ]
        },
        {
          assistantId: "d102f12f-719c-4a1e-bd61-5b96553c8b9c",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message",
            firstMessage: "What is your question?"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: "Give me a second",
              description: "If client has questions regarding other topics"
            }
          ]
        },
        {
          assistantId: "0d9091fa-b7d0-4bc1-a57f-53d6e3db7771",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message",
            firstMessage: "What is your question?"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: "Give me a second",
              description: "Other questions"
            }
          ]
        },
        {
          assistantId: "4c5c9cf8-2001-4566-8c65-8318b8814db4",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: " ",
              description: "Fallback"
            }
          ]
        }
      ]
    };

    (function (d, t) {
      var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
      g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      g.defer = g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function () {
        vapiInstance = window.vapiSDK.run({
          apiKey: apiKey,
          squad: squad,
          config: {
            position: "bottom-right",
            idle: {
              color: "#7A3FFD",
              type: "pill",
              title: "Talk to Bagira",
              subtitle: "Voice Legal Help",
              icon: "https://unpkg.com/lucide-static@0.321.0/icons/mic.svg"
            }
          }
        });

        const modal = document.getElementById("bagiraFormModal");
        const form  = document.getElementById("bagiraForm");
        const close = document.getElementById("closeModal");
        const phoneInput = document.getElementById("phoneInput"); // Get phone input for focusing

        // --- MODIFIED PART: Modal display logic ---
        // REMOVED: Old logic to show modal on call-start
        // vapiInstance.on("call-start", () => {
        //   modal.style.display = "flex";
        // });

        vapiInstance.on("message", (message) => {
          // console.log("VAPI Message:", message); // For debugging message structure

          if (
            message.type === "transcript" &&
            message.role === "assistant" &&
            message.transcriptType === "final" && // Ensure we act on the complete sentence
            message.transcript
          ) {
            const assistantUtterance = message.transcript.toLowerCase().trim();
            // The exact phrase from the assistant's script, converted to lowercase
            const targetPhrase = "please type your phone number below to confirm.";

            // Check if the assistant's utterance *is* the target phrase.
            // Using .includes() could also work if there are minor variations like punctuation.
            // Given the script says "exact phrase", a direct comparison (after normalization) is appropriate.
            if (assistantUtterance === targetPhrase) {
              if (modal.style.display !== "flex") { // Only show if not already visible
                modal.style.display = "flex";
                phoneInput.focus(); // Auto-focus the phone input field
                // Update modal header to be more specific to the context
                document.querySelector("#bagiraFormModal .modal-header").textContent = "Please enter your phone and email to confirm your booking.";
              }
            }
          }
        });
        // --- END OF MODIFIED PART ---

        close.addEventListener("click", () => {
          modal.style.display = "none";
        });

        form.addEventListener("submit", function(e) {
          e.preventDefault();

          const phone = phoneInput.value;
          const email = document.getElementById("emailInput").value;

          const submitButton = form.querySelector('button[type="submit"]');
          const originalButtonText = submitButton.textContent;
          submitButton.disabled = true;
          submitButton.textContent = "Submitting...";

          fetch("https://primary-production-3672.up.railway.app/webhook/bagira-submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone, email })
          })
          .then(response => {
            if (response.ok) {
              alert("Submission successful! ✅ Your booking details have been received.");
            } else {
              alert("Submission failed. ❌ Please try again or contact support.");
            }
            modal.style.display = "none";
          })
          .catch(error => {
            console.error("Error submitting form:", error);
            alert("Something went wrong. ❌\n" + (error.message || error));
            modal.style.display = "none";
          })
          .finally(() => {
            submitButton.disabled = false;
            submitButton.textContent = originalButtonText;
            // Optionally reset form fields here
            // form.reset();
          });
        });
      };
    })(document, "script");
  </script>
</body>
</html>
