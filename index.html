<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bagira Assistant</title>
  <style>
    #popupForm {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      z-index: 9999;
    }
    #popupForm input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }
    #popupForm button {
      padding: 10px 15px;
      cursor: pointer;
    }
    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 9998;
    }
  </style>
</head>
<body>
  <h1>Talk to Bagira 🐾</h1>
  <p>Click the mic to ask legal questions.</p>

  <div id="popupOverlay"></div>
  <div id="popupForm">
    <h3>Please enter your details</h3>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email" required>
    <button onclick="submitForm()">Submit</button>
  </div>

  <script>
    var vapiInstance = null;

    const apiKey = "58f89212-0e94-4123-8f9e-3bc0dde56fe0";

    const squad = {
      name: "Call Centre v1.3 EN",
      members: [
        {
          assistantId: "f60d3d06-8dd2-4e0e-b0e5-ed28384203a2",
          assistantDestinations: [
            { type: "assistant", assistantName: "BAGIRA - Сompany expert (EN)", message: "One second", description: "If client has questions regarding company registration" },
            { type: "assistant", assistantName: "BAGIRA - Appointment master (EN)", message: "", description: "If user wants to book a consultation" },
            { type: "assistant", assistantName: "BAGIRA - TRP expert (EN)", message: "One second", description: "If client has questions regarding residence permit" }
          ]
        },
        {
          assistantId: "d102f12f-719c-4a1e-bd61-5b96553c8b9c",
          assistantOverrides: { firstMessageMode: "assistant-speaks-first-with-model-generated-message", firstMessage: "What is your question?" },
          assistantDestinations: [
            { type: "assistant", assistantName: "BAGIRA - Appointment master (EN)", message: "", description: "If user wants to book a consultation" },
            { type: "assistant", assistantName: "BAGIRA - First responder (EN)", message: "Give me a second", description: "If client has questions regarding other topics" }
          ]
        },
        {
          assistantId: "0d9091fa-b7d0-4bc1-a57f-53d6e3db7771",
          assistantOverrides: { firstMessageMode: "assistant-speaks-first-with-model-generated-message", firstMessage: "What is your question?" },
          assistantDestinations: [
            { type: "assistant", assistantName: "BAGIRA - Appointment master (EN)", message: "", description: "If user wants to book a consultation" },
            { type: "assistant", assistantName: "BAGIRA - First responder (EN)", message: "Give me a second", description: "Other questions" }
          ]
        },
        {
          assistantId: "4c5c9cf8-2001-4566-8c65-8318b8814db4",
          assistantOverrides: { firstMessageMode: "assistant-speaks-first-with-model-generated-message" },
          assistantDestinations: [
            { type: "assistant", assistantName: "BAGIRA - First responder (EN)", message: " ", description: "Fallback" }
          ]
        }
      ]
    };

    (function (d, t) {
      var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
      g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function () {
        vapiInstance = window.vapiSDK.run({
          apiKey: apiKey,
          squad: squad,
          config: {
            position: "bottom-right",
            idle: {
              color: "#1E90FF",
              type: "pill",
              title: "Talk to Bagira",
              subtitle: "Voice Legal Help",
              icon: "https://unpkg.com/lucide-static@0.321.0/icons/mic.svg"
            }
          }
        });

        document.querySelector('.vapi-pill').onclick = function() {
          document.getElementById('popupOverlay').style.display = 'block';
          document.getElementById('popupForm').style.display = 'block';
        };
      };
    })(document, "script");

    function submitForm() {
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      alert(`Phone: ${phone}\nEmail: ${email}`);
      document.getElementById('popupOverlay').style.display = 'none';
      document.getElementById('popupForm').style.display = 'none';
    }
  </script>
</body>
</html>
