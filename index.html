<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bagira Assistant</title>
  <style>
    /* Modal overlay */
    #bagiraFormModal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
    }
    /* Modal box */
    #bagiraFormModal .modal-content {
      position: relative;
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      width: 320px;
      box-sizing: border-box;
    }
    /* Close button */
    #closeModal {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
    }
    /* Header */
    #bagiraFormModal .modal-header {
      margin-bottom: 15px;
      font-size: 1rem;
      font-weight: bold;
    }
    /* Inputs & submit */
    #bagiraFormModal input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }
    #bagiraFormModal button[type="submit"] {
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <h1>Talk to Bagira 🐾</h1>
  <p>Click the mic to ask legal questions.</p>

  <!-- Popup form -->
  <div id="bagiraFormModal">
    <div class="modal-content">
      <button id="closeModal" aria-label="Close">&times;</button>
      <div class="modal-header">
        Please fill in the form below, so we would send you booking confirmation if you book a slot
      </div>
      <form id="bagiraForm">
        <label>
          Phone Number:<br>
          <input type="tel" id="phoneInput" required placeholder="+1234567890">
        </label>
        <label>
          Email:<br>
          <input type="email" id="emailInput" required placeholder="you@example.com">
        </label>
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <script>
    var vapiInstance = null;

    const apiKey = "58f89212-0e94-4123-8f9e-3bc0dde56fe0"; // Replace with your real key

    // Full squad object exactly as in your original code
    const squad = {
      name: "Call Centre v1.3 EN",
      members: [
        {
          assistantId: "f60d3d06-8dd2-4e0e-b0e5-ed28384203a2",
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Сompany expert (EN)",
              message: "One second",
              description: "If client has questions regarding company registration"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - TRP expert (EN)",
              message: "One second",
              description: "If client has questions regarding residence permit"
            }
          ]
        },
        {
          assistantId: "d102f12f-719c-4a1e-bd61-5b96553c8b9c",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message",
            firstMessage: "What is your question?"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: "Give me a second",
              description: "If client has questions regarding other topics"
            }
          ]
        },
        {
          assistantId: "0d9091fa-b7d0-4bc1-a57f-53d6e3db7771",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message",
            firstMessage: "What is your question?"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - Appointment master (EN)",
              message: "",
              description: "If user wants to book a consultation"
            },
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: "Give me a second",
              description: "Other questions"
            }
          ]
        },
        {
          assistantId: "4c5c9cf8-2001-4566-8c65-8318b8814db4",
          assistantOverrides: {
            firstMessageMode: "assistant-speaks-first-with-model-generated-message"
          },
          assistantDestinations: [
            {
              type: "assistant",
              assistantName: "BAGIRA - First responder (EN)",
              message: " ",
              description: "Fallback"
            }
          ]
        }
      ]
    };

    (function (d, t) {
      var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
      g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      g.defer = g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function () {
        // Initialize VAPI with correct squad.members
        vapiInstance = window.vapiSDK.run({
          apiKey: apiKey,
          squad: squad,
          config: {
            position: "bottom-right",
            idle: {
              color: "#1E90FF",
              type: "pill",
              title: "Talk to Bagira",
              subtitle: "Voice Legal Help",
              icon: "https://unpkg.com/lucide-static@0.321.0/icons/mic.svg"
            }
          }
        });

        // Grab modal elements
        const modal = document.getElementById("bagiraFormModal");
        const form  = document.getElementById("bagiraForm");
        const close = document.getElementById("closeModal");

        // Show the modal when the voice session starts
        vapiInstance.on("call-start", () => {
          modal.style.display = "flex";
        });

        // Close button hides the modal
        close.addEventListener("click", () => {
          modal.style.display = "none";
        });

        // Form submit handler
        form.addEventListener("submit", function(e) {
          e.preventDefault();
          const phone = document.getElementById("phoneInput").value;
          const email = document.getElementById("emailInput").value;
          console.log("Phone:", phone, "Email:", email);
          alert(`Phone: ${phone}\nEmail: ${email}`);
          modal.style.display = "none";
        });
      };
    })(document, "script");
  </script>
</body>
</html>
